version: '3.8'

services:
  # Laravel App Container (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - app-storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-restaurant_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - RUN_MIGRATIONS=true
      - SEED_DATABASE=false
    depends_on:
      - db
      - redis
    networks:
      - restaurant-network

  # Nginx Web Server Container
  web:
    image: nginx:alpine
    container_name: restaurant-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - restaurant-network

  # MySQL Database Container
  db:
    image: mysql:8.0
    container_name: restaurant-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-restaurant_db}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - restaurant-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache Container
  redis:
    image: redis:alpine
    container_name: restaurant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local
